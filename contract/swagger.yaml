components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    GoogleOAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            openid: OpenID scope
            email: User email
            profile: Basic profile
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Solicitud invalida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: victory-craft-backend
        timestamp:
          type: string
          format: date-time

    User:
      type: object
      properties:
        _id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        googleSub:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        password:
          type: string
        profileImage:
          type: string
        role:
          type: string
          enum: [user, admin]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserRegisterRequest:
      type: object
      required: [username, email, password, firstName, lastName]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [user, admin]

    UserUpdateRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        profileImage:
          type: string
        role:
          type: string
          enum: [user, admin]

    UserLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    FieldLocation:
      type: object
      properties:
        name:
          type: string
        lat:
          type: number
        long:
          type: number

    Field:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [football, padel, tennis]
        location:
          $ref: "#/components/schemas/FieldLocation"
        pricePerHour:
          type: number
        imageS3Key:
          type: string
        imageUrl:
          type: string
        owner:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FieldInput:
      type: object
      required: [name, type, pricePerHour, owner]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [football, padel, tennis]
        location:
          $ref: "#/components/schemas/FieldLocation"
        pricePerHour:
          type: number
        imageS3Key:
          type: string
        owner:
          type: string

    FieldUpdateRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [football, padel, tennis]
        location:
          $ref: "#/components/schemas/FieldLocation"
        pricePerHour:
          type: number
        imageS3Key:
          type: string
        owner:
          type: string

    Slot:
      type: object
      properties:
        _id:
          type: string
        field:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isAvailable:
          type: boolean
        value:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SlotInput:
      type: object
      required: [field, startTime, endTime, value]
      properties:
        field:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isAvailable:
          type: boolean
        value:
          type: number

    SlotUpdateRequest:
      type: object
      properties:
        field:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        isAvailable:
          type: boolean
        value:
          type: number

    Reservation:
      type: object
      properties:
        _id:
          type: string
