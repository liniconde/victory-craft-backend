openapi: 3.0.3
info:
  title: Victory Craft Backend API
  version: 1.0.0
  description: >
    Contrato OpenAPI del microservicio de Victory Craft para gestion de
    usuarios, campos deportivos (football, tennis, padel), slots, reservas,
    videos, imagenes y estadisticas.
servers:
  - url: http://localhost:5001
    description: Local
tags:
  - name: System
  - name: Users
  - name: Fields
  - name: Slots
  - name: Reservations
  - name: Videos
  - name: Video Stats
  - name: Streaming
  - name: Images
  - name: Concerts
paths:
  /healthz:
    get:
      tags: [System]
      summary: Healthcheck de la API
      responses:
        "200":
          description: API operativa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /users:
    get:
      tags: [Users]
      summary: Listar usuarios
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{id}:
    get:
      tags: [Users]
      summary: Obtener usuario por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Usuario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Users]
      summary: Actualizar usuario
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Users]
      summary: Eliminar usuario
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Usuario eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/register:
    post:
      tags: [Users]
      summary: Registrar usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterRequest"
      responses:
        "201":
          description: Usuario registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/login:
    post:
      tags: [Users]
      summary: Iniciar sesion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginRequest"
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/oauth2/google:
    get:
      tags: [Users]
      summary: Iniciar OAuth 2.0 con Google
      parameters:
        - in: query
          name: redirect_uri
          required: true
          schema:
            type: string
            format: uri
        - in: query
          name: return_to
          required: false
          schema:
            type: string
            default: /
      responses:
        "302":
          description: Redireccion a Google OAuth consent screen
        "400":
          description: redirect_uri no permitido o configuracion invalida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/oauth2/google/callback:
    get:
      tags: [Users]
      summary: Callback OAuth 2.0 de Google
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redireccion al frontend con token o error
        "400":
          description: Error en callback OAuth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fields:
    get:
      tags: [Fields]
      summary: Listar campos deportivos
      responses:
        "200":
          description: Lista de campos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Field"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Fields]
      summary: Crear campo deportivo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldInput"
      responses:
        "201":
          description: Campo creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Field"
        "400":
          $ref: "#/components/responses/BadRequest"

  /fields/{id}:
    get:
      tags: [Fields]
      summary: Obtener campo por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Campo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Field"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Fields]
      summary: Actualizar campo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldUpdateRequest"
      responses:
        "200":
          description: Campo actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Field"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Fields]
      summary: Eliminar campo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Campo eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /fields/users/{userId}:
    get:
      tags: [Fields]
      summary: Listar campos por usuario propietario
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista de campos del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Field"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /fields/{id}/slots:
    get:
      tags: [Fields]
      summary: Listar slots del campo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Slots del campo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"
        "500":
          $ref: "#/components/responses/InternalError"

  /fields/{id}/videos:
    get:
      tags: [Fields]
      summary: Listar videos del campo
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Videos del campo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldVideo"
        "500":
          $ref: "#/components/responses/InternalError"

  /slots:
    get:
      tags: [Slots]
      summary: Listar todos los slots
      responses:
        "200":
          description: Lista de slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Slots]
      summary: Crear slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlotInput"
      responses:
        "201":
          description: Slot creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"
        "500":
          $ref: "#/components/responses/InternalError"

  /slots/{id}:
    get:
      tags: [Slots]
      summary: Obtener slot por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Slots]
      summary: Actualizar slot
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlotUpdateRequest"
      responses:
        "200":
          description: Slot actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slot"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Slots]
      summary: Eliminar slot
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Slot eliminado
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /slots/{id}/field:
    get:
      tags: [Slots]
      summary: Listar slots por field ID
      description: >
        En esta ruta, `id` representa el ID del campo (fieldId), aunque el
        parametro se llame `id`.
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Lista de slots para el campo
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"
        "500":
          $ref: "#/components/responses/InternalError"

  /reservations:
    get:
      tags: [Reservations]
      summary: Listar reservas
      responses:
        "200":
          description: Lista de reservas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Reservations]
      summary: Crear reserva
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationInput"
      responses:
        "201":
          description: Reserva creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "500":
          $ref: "#/components/responses/InternalError"

  /reservations/{id}:
    get:
      tags: [Reservations]
      summary: Obtener reserva por ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Reserva
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Reservations]
      summary: Actualizar reserva
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationUpdateRequest"
      responses:
        "200":
          description: Reserva actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Reservations]
      summary: Eliminar reserva
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Reserva eliminada
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /reservations/user/{id}:
    get:
      tags: [Reservations]
      summary: Listar reservas por usuario
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Reservas del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos:
    post:
      tags: [Videos]
      summary: Crear registro de video asociado a campo/slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoCreateRequest"
      responses:
        "201":
          description: Video creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos/library:
    get:
      tags: [Videos]
      summary: Listar videos de biblioteca (paginado)
      description: >
        Devuelve items livianos para listado con URL firmada de reproduccion.
        Si `searchTerm` viene, filtra globalmente antes de paginar por `s3Key` (contains
        case-insensitive) y por coincidencia en `_id` convertido a string.
        Tambien permite filtrar por `sportType`.
        Ejemplo: `/videos/library?page=1&limit=20&searchTerm=padel&sportType=football`.
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: searchTerm
          required: false
          schema:
            type: string
          description: Texto de busqueda global (se aplica antes de paginar)
        - in: query
          name: sportType
          required: false
          schema:
            type: string
            enum: [football, padel, tennis, basketball, other]
          description: Filtra por tipo de deporte del video
      responses:
        "200":
          description: Lista paginada de videos de biblioteca
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoLibraryPaginatedResponse"
              examples:
                filtered:
                  summary: Ejemplo con filtro por nombre
                  value:
                    items:
                      - _id: "67ed8f71cf3e27c5fe0ce245"
                        s3Key: "videoPadelTest.mp4"
                        uploadedAt: "2025-04-02T19:26:41.417Z"
                        videoUrl: "https://victory-craft.s3.amazonaws.com/videoPadelTest.mp4?X-Amz-..."
                    pagination:
                      page: 1
                      limit: 20
                      total: 1
                      totalPages: 1
                      hasNextPage: false
                      hasPrevPage: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Videos]
      summary: Crear registro de video para biblioteca (sin cancha)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoLibraryCreateRequest"
      responses:
        "201":
          description: Video de biblioteca creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos/{id}:
    put:
      tags: [Videos]
      summary: Actualizar video
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoUpdateRequest"
      responses:
        "200":
          description: Video actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Videos]
      summary: Eliminar video por id (S3 + DB relacionadas)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Video eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  deletedVideoId:
                    type: string
                  deletedS3Key:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Error al borrar archivo en S3
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /videos/upload:
    post:
      tags: [Videos]
      summary: Generar URL firmada para subir video a S3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectKeyRequest"
      responses:
        "200":
          description: URL firmada de subida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S3UploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos/sign-upload:
    post:
      tags: [Videos]
      summary: Generar URL firmada para subir video a S3 (alias compatible frontend)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectKeyRequest"
      responses:
        "200":
          description: URL firmada de subida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S3UploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos/{videoId}/analyze:
    post:
      tags: [Videos]
      summary: Ejecutar analisis AI sobre video
      parameters:
        - in: path
          name: videoId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resultado del analisis
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos/{id}/analyzeVideo:
    post:
      tags: [Videos]
      summary: Crear job de analisis Gemini y encolar en SQS
      description: >
        Flujo de analisis basado en Gemini. Convive con `/videos/{id}/analyzeAgent`
        y el frontend puede ofrecer ambas opciones al usuario segun el tipo de
        procesamiento que quiera ejecutar.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeVideoJobRequest"
      responses:
        "201":
          description: Job creado y encolado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  job:
                    $ref: "#/components/schemas/AnalysisJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /videos/{id}/analyzeAgent:
    post:
      tags: [Videos]
      summary: Crear job de analisis con worker-agent externo
      description: >
        Construye el evento `video.analysis.requested`, lo valida con zod y lo publica
        en la cola SQS del worker-agent externo. Este flujo esta pensado para
        analisis avanzados orquestados por un agente con tools externas, incluyendo
        procesamiento mas robusto en Python y generacion de artefactos o videos
        derivados. La respuesta incluye los ids de correlacion para seguimiento
        end-to-end desde frontend o backend.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID del video de biblioteca o de campo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeAgentVideoJobRequest"
            examples:
              e2e:
                summary: Ejemplo real de prueba E2E
                value:
                  analysisType: agent_prompt
                  prompt: Descarga el video desde S3, ejecuta render de detecciones YOLO con color de camiseta, genera un archivo JSON de estadísticas, sube los artifacts a S3 y analiza los artifacts generados para resumir si el procesamiento fue correcto y si hay hallazgos.
                  maxAttempts: 5
                  outputS3Prefix: video-analysis-results/agent-e2e-001
                  localJobDir: /tmp/video-analysis/agent-e2e-001
                  render:
                    toolName: video.worker.render_yolo_boxes_with_jersey_color
                    outputDir: /tmp/video-analysis/agent-e2e-001/out
                    yoloModel: yolov8n.pt
                    processFps: 5
                    conf: 0.25
                  stats:
                    toolName: video.generate_stats_json
                    outputPath: /tmp/video-analysis/agent-e2e-001/out/stats.json
                  upload:
                    toolName: video.upload_artifacts_to_s3
                    bucket: victory-craft
                    destinationPrefix: video-analysis-results/agent-e2e-001
                  analysis:
                    toolName: video.analyze_generated_artifacts
                    analysisPrompt: Resume si los artefactos fueron generados correctamente y si hay hallazgos.
      responses:
        "201":
          description: Job agent creado y publicado en SQS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeAgentVideoJobResponse"
              examples:
                queued:
                  summary: Respuesta real de job encolado
                  value:
                    message: Agent analysis job created and queued
                    job:
                      _id: 69adc6d72347dffa88e7fa00
                      videoId: 67e48d85ebfc561722a57a22
                      analysisType: agent_prompt
                      status: queued
                      input:
                        prompt: Descarga el video desde S3, ejecuta render de detecciones YOLO con color de camiseta, genera un archivo JSON de estadísticas, sube los artifacts a S3 y analiza los artifacts generados para resumir si el procesamiento fue correcto y si hay hallazgos.
                      createdAt: "2026-03-08T18:58:31.202Z"
                      updatedAt: "2026-03-08T18:58:31.737Z"
                      sqsMessageId: 0bb58429-2601-4abb-90a4-f5e6e1c88b66
                      workerCorrelationId: 69adc6d72347dffa88e7fa00
                      workerEventId: 6b08456e-a1d7-4b0a-a11f-b48350548093
                      workerIdempotencyKey: victorycraft:video.analysis.requested:67e48d85ebfc561722a57a22:v1
                      workerRequestId: 8f26d9f1-0ec5-4f2a-bcce-67a381dcb45d
                      workerTraceId: 27119b2d-9a3f-4bb8-a25a-6b07b253a754
                      workerEvent:
                        contractVersion: "1.0"
                        eventId: 6b08456e-a1d7-4b0a-a11f-b48350548093
                        eventType: video.analysis.requested
